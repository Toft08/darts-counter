<div class="darts-input-container">
  <app-dart-by-dart-input
    *ngIf="game.inputMode === 'dart-by-dart'"
    [config]="config"
    (dartThrown)="dartThrown.emit($event)"
    (undoDart)="undoDart.emit($event)">
  </app-dart-by-dart-input>

  <app-per-turn-input
    *ngIf="game.inputMode === 'per-turn'"
    (dartThrown)="dartThrown.emit($event)"
    (undoDart)="undoDart.emit($event)">
  </app-per-turn-input>
</div>
