<div class="half-input">

  <!-- NUMBER target: Miss / Single / Double / Triple -->
  <ng-container *ngIf="target.kind === 'number'">
    <div class="hit-row">
      <button class="hit-btn miss-btn" (click)="miss()">Miss</button>
      <button class="hit-btn single-btn" (click)="hitNumber(1)">
        <span class="hit-label">Single</span>
        <span class="hit-value">{{ numberValue }}</span>
      </button>
      <button class="hit-btn double-btn" (click)="hitNumber(2)">
        <span class="hit-label">Double</span>
        <span class="hit-value">{{ numberValue * 2 }}</span>
      </button>
      <button class="hit-btn triple-btn" (click)="hitNumber(3)">
        <span class="hit-label">Triple</span>
        <span class="hit-value">{{ numberValue * 3 }}</span>
      </button>
    </div>
  </ng-container>

  <!-- DOUBLE target: dart-by-dart grid, Dub locked-on -->
  <ng-container *ngIf="target.kind === 'double'">
    <app-dart-by-dart-input
      [config]="doubleConfig"
      [initialMultiplier]="2"
      (dartThrown)="onGridDart($event)">
    </app-dart-by-dart-input>
  </ng-container>

  <!-- TRIPLE target: dart-by-dart grid, Tri locked-on -->
  <ng-container *ngIf="target.kind === 'triple'">
    <app-dart-by-dart-input
      [config]="tripleConfig"
      [initialMultiplier]="3"
      (dartThrown)="onGridDart($event)">
    </app-dart-by-dart-input>
  </ng-container>

  <!-- 41 EXACT target: full dart-by-dart grid, S/D/T all free -->
  <ng-container *ngIf="target.kind === 'exact'">
    <app-dart-by-dart-input
      [config]="standardConfig"
      [initialMultiplier]="1"
      (dartThrown)="onGridDart($event)">
    </app-dart-by-dart-input>
  </ng-container>

  <!-- BULL target: Miss / Single Bull / Double Bull -->
  <ng-container *ngIf="target.kind === 'bull'">
    <div class="hit-row">
      <button class="hit-btn miss-btn" (click)="miss()">Miss</button>
      <button class="hit-btn single-btn" (click)="hitBull(25)">
        <span class="hit-label">Single Bull</span>
        <span class="hit-value">25</span>
      </button>
      <button class="hit-btn double-btn" (click)="hitBull(50)">
        <span class="hit-label">Double Bull</span>
        <span class="hit-value">50</span>
      </button>
    </div>
  </ng-container>

</div>
